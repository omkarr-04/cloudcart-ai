name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-auth-service:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/auth-service

    # Provide a minimal test environment using Docker Service Containers
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloudcart_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # Monorepo aware install
    - name: Install dependencies
      working-directory: ./
      run: npm install

    - name: Check code formatting
      run: npm run format -- --check

    - name: Run ESLint
      run: npm run lint

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Apply Test DB Migrations
      run: npx prisma db push --accept-data-loss
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloudcart_auth_test?schema=public

    - name: Run Integration Tests with Coverage
      run: npm run test:coverage
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloudcart_auth_test?schema=public
        REDIS_URL: redis://localhost:6379
        JWT_ACCESS_TOKEN_SECRET: test-access-secret-minimum-10-chars
        JWT_REFRESH_TOKEN_SECRET: test-refresh-secret-minimum-10-chars

    - name: Validate Docker Build
      working-directory: ./
      run: docker build -t cloudcart-auth-service:test -f infra/docker/auth-service.Dockerfile --target production .
