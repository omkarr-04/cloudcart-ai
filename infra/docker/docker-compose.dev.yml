version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloudcart-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cloudcart_auth}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cloudcart_auth}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloudcart-dev-network

  redis:
    image: redis:7-alpine
    container_name: cloudcart-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cloudcart-dev-network

  auth-service:
    build:
      context: ../../
      dockerfile: infra/docker/auth-service.Dockerfile
      target: dev
    container_name: cloudcart-auth-service-dev
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ../../:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cloudcart_auth}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET:-dev-access-secret-minimum-10-chars}
      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET:-dev-refresh-secret-minimum-10-chars}
      - ACCESS_TOKEN_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudcart-dev-network

networks:
  cloudcart-dev-network:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
